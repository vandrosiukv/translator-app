
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:transparent}
#app{display:flex;flex-direction:column;height:580px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary)}
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);flex-shrink:0}
#header-left{display:flex;align-items:center;gap:10px}
#logo{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#0057B7,#FFD700);display:flex;align-items:center;justify-content:center;font-size:14px}
#header-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
#header-sub{font-size:11px;color:var(--color-text-secondary)}
#header-right{display:flex;align-items:center;gap:6px}
.hbtn{font-size:12px;padding:5px 10px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.hbtn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
#menu-wrap{position:relative}
#menu-dropdown{position:absolute;top:34px;right:0;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);z-index:50;min-width:170px;display:none;box-shadow:0 4px 16px rgba(0,0,0,0.1)}
#menu-dropdown.open{display:block}
.menu-item{display:block;width:100%;padding:9px 14px;font-size:13px;color:var(--color-text-primary);background:transparent;border:none;cursor:pointer;text-align:left}
.menu-item:hover{background:var(--color-background-secondary)}
#chat{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-thumb{background:var(--color-border-secondary);border-radius:2px}
.welcome{text-align:center;padding:24px 0 12px}
.welcome-emoji{font-size:28px;margin-bottom:8px}
.welcome-title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.welcome-sub{font-size:12px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:14px}
.examples{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.example-btn{padding:5px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);font-size:11px;cursor:pointer;font-family:var(--font-sans)}
.example-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.msg-row{display:flex}
.msg-row.user{justify-content:flex-end}
.msg-row.bot{justify-content:flex-start}
.bubble-user{max-width:75%;padding:9px 13px;border-radius:16px 16px 4px 16px;background:#0057B7;color:#fff;font-size:13px;line-height:1.5}
.bubble-bot{max-width:82%;border:0.5px solid var(--color-border-tertiary);border-radius:16px 16px 16px 4px;overflow:hidden;background:var(--color-background-primary)}
.bubble-top{padding:6px 12px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:6px;font-size:11px;color:var(--color-text-secondary)}
.bubble-text{padding:10px 13px;font-size:13px;line-height:1.55;color:var(--color-text-primary)}
.bubble-note{padding:5px 12px 9px;font-size:11px;color:var(--color-text-secondary);font-style:italic;border-top:0.5px solid var(--color-border-tertiary)}
.typing{display:flex;align-items:center;gap:4px;padding:10px 13px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--color-border-secondary);animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
#footer{border-top:0.5px solid var(--color-border-tertiary);padding:10px 12px;display:flex;align-items:flex-end;gap:8px;flex-shrink:0;background:var(--color-background-secondary)}
#input{flex:1;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:10px;font-size:13px;font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-background-primary);resize:none;outline:none;line-height:1.4;max-height:90px}
#input:focus{border-color:var(--color-border-primary)}
#send-btn{width:34px;height:34px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#send-btn.active{background:#0057B7;color:#fff;border-color:#0057B7}
#share-toast{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:7px 14px;font-size:12px;color:var(--color-text-primary);display:none;white-space:nowrap;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
</style>

<h2 class="sr-only" style="position:absolute;left:-9999px">Translator bot Ukrainian to Spanish and back</h2>

<div id="app">
  <div id="header">
    <div id="header-left">
      <div id="logo">🌻</div>
      <div>
        <div id="header-title">Перекладач УКР ↔ ESP</div>
        <div id="header-sub">розуміє контекст · ігнорує помилки</div>
      </div>
    </div>
    <div id="header-right">
      <button class="hbtn" id="share-btn">↗ Поділитись</button>
      <div id="menu-wrap">
        <button class="hbtn" id="menu-btn">⋯</button>
        <div id="menu-dropdown">
          <button class="menu-item" id="clear-btn">🔄 Очистити чат</button>
          <button class="menu-item" id="copy-link-btn">📋 Копіювати посилання</button>
          <button class="menu-item" id="about-btn">ℹ️ Про бота</button>
        </div>
      </div>
    </div>
  </div>

  <div id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-emoji">🌻🌹</div>
      <div class="welcome-title">Контекстний перекладач</div>
      <div class="welcome-sub">Пиши українською або español —<br>автоматично визначу мову і перекладу.</div>
      <div class="examples" id="examples"></div>
    </div>
  </div>

  <div id="footer">
    <textarea id="input" placeholder="Напиши по-українськи або en español..." rows="1"></textarea>
    <button id="send-btn">↑</button>
  </div>
  <div id="share-toast">✓ Посилання скопійовано!</div>
</div>

<script>
// ─── Вставте сюди свій Gemini API ключ ───────────────────────
const GEMINI_API_KEY = 'AIzaSyC-74b5lVzfdqoRTYR9gV0sCv_ps135Vos';
// ─────────────────────────────────────────────────────────────

const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;

const EXAMPLES = [
  {text:"Що по чому?", hint:"сленг"},
  {text:"¿Qué onda, bro?", hint:"розмовне"},
  {text:"Не кажи гоп", hint:"приказка"},
  {text:"Más vale tarde que nunca", hint:"ідіома"},
  {text:"Я вже йду де-де", hint:"з помилками"},
];

const SYSTEM = `Ти — експертний перекладач між українською та іспанською мовами з глибоким знанням обох культур.

ПРАВИЛА:
1. Автоматично визначай мову вхідного тексту (українська або іспанська).
2. Якщо мова українська — перекладай на іспанську. Якщо іспанська — перекладай на українську.
3. ІГНОРУЙ орфографічні та граматичні помилки — розумій контекст.
4. Враховуй КОНТЕКСТ: сленг, ідіоми, жарти — перекладай по суті.
5. Використовуй ЛОКАЛЬНУ СПЕЦИФІКУ: для іспанської — нейтральний латиноамериканський варіант; для української — сучасна розмовна норма.
6. Якщо є ідіома без прямого перекладу — знайди еквівалент у цільовій мові.
7. Відповідай ЛИШЕ у форматі JSON (без жодного тексту навколо):
{"translation":"переклад","detected_lang":"uk або es","note":"необов'язкова коротка нотатка якщо є щось цікаве, інакше порожній рядок"}`;

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const welcome = document.getElementById('welcome');
const toast = document.getElementById('share-toast');
let loading = false;

// Examples
const examplesDiv = document.getElementById('examples');
EXAMPLES.forEach(ex => {
  const btn = document.createElement('button');
  btn.className = 'example-btn';
  btn.textContent = ex.text + ' · ' + ex.hint;
  btn.onclick = () => send(ex.text);
  examplesDiv.appendChild(btn);
});

function flagFrom(lang) { return lang === 'uk' ? '🇺🇦' : lang === 'es' ? '🇪🇸' : '🌐'; }
function flagTo(lang)   { return lang === 'uk' ? '🇪🇸' : lang === 'es' ? '🇺🇦' : '🌐'; }
function langLabel(lang){ return lang === 'uk' ? 'укр → іспанська' : lang === 'es' ? 'іспанська → укр' : ''; }

function addUserMsg(text) {
  if (welcome) welcome.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'msg-row user';
  const bbl = document.createElement('div');
  bbl.className = 'bubble-user';
  bbl.textContent = text;
  row.appendChild(bbl);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';
  const bbl = document.createElement('div');
  bbl.className = 'bubble-bot';
  bbl.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  row.appendChild(bbl);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function replaceTyping(typingRow, data) {
  const bbl = document.createElement('div');
  bbl.className = 'bubble-bot';
  bbl.innerHTML = `<div class="bubble-top">${flagFrom(data.detected_lang)} → ${flagTo(data.detected_lang)} <span style="opacity:.6">${langLabel(data.detected_lang)}</span></div>
    <div class="bubble-text">${data.translation}</div>
    ${data.note ? `<div class="bubble-note">💡 ${data.note}</div>` : ''}`;
  typingRow.innerHTML = '';
  typingRow.className = 'msg-row bot';
  typingRow.appendChild(bbl);
  chat.scrollTop = chat.scrollHeight;
}

async function send(text) {
  if (!text.trim() || loading) return;
  loading = true;
  sendBtn.className = '';
  input.value = '';
  input.style.height = 'auto';
  addUserMsg(text);
  const typingRow = addTyping();
  try {
    const res = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        system_instruction: {parts: [{text: SYSTEM}]},
        contents: [{role: 'user', parts: [{text}]}],
        generationConfig: {
          maxOutputTokens: 500,
          responseMimeType: 'application/json'
        }
      })
    });
    const d = await res.json();
    const raw = d.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
    let parsed;
    try { parsed = JSON.parse(raw.replace(/```json|```/g, '').trim()); }
    catch { parsed = {translation: raw, detected_lang: '?', note: ''}; }
    replaceTyping(typingRow, parsed);
  } catch(e) {
    replaceTyping(typingRow, {translation: 'Помилка з\'єднання. Спробуй ще раз.', detected_lang: '?', note: ''});
  }
  loading = false;
  updateBtn();
}

function updateBtn() {
  sendBtn.className = input.value.trim() && !loading ? 'active' : '';
}

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 90) + 'px';
  updateBtn();
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input.value); }
});
sendBtn.onclick = () => send(input.value);

// Menu
const menuBtn = document.getElementById('menu-btn');
const menuDrop = document.getElementById('menu-dropdown');
menuBtn.onclick = (e) => { e.stopPropagation(); menuDrop.classList.toggle('open'); };
document.addEventListener('click', () => menuDrop.classList.remove('open'));

document.getElementById('clear-btn').onclick = () => {
  chat.innerHTML = '';
  chat.appendChild(welcome);
  welcome.style.display = '';
  menuDrop.classList.remove('open');
};

function showToast() {
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 2000);
}

document.getElementById('copy-link-btn').onclick = async () => {
  await navigator.clipboard.writeText(window.location.href).catch(() => {});
  showToast();
  menuDrop.classList.remove('open');
};

document.getElementById('share-btn').onclick = async () => {
  const url = window.location.href;
  if (navigator.share) {
    await navigator.share({title: 'Перекладач УКР↔ESP', url}).catch(() => {});
  } else {
    await navigator.clipboard.writeText(url).catch(() => {});
    showToast();
  }
};

document.getElementById('about-btn').onclick = () => {
  if (welcome) welcome.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  const bbl = document.createElement('div');
  bbl.className = 'bubble-bot';
  bbl.innerHTML = '<div class="bubble-top">🤖 інфо</div><div class="bubble-text">Я — контекстний перекладач між українською та іспанською. Розумію сленг, ідіоми та приказки. Ігнорую помилки і перекладаю по суті, а не дослівно. Безкоштовно та без реєстрації.</div>';
  row.appendChild(bbl);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  menuDrop.classList.remove('open');
};
</script>
