<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Перекладач">
<title>Перекладач УКР ↔ ESP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f2f2f7}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#app{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto;background:#fff;position:relative}
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));border-bottom:0.5px solid #e0e0e0;background:#f8f8f8;flex-shrink:0}
#header-left{display:flex;align-items:center;gap:10px}
#logo{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#0057B7,#FFD700);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
#header-title{font-size:14px;font-weight:600;color:#000}
#header-sub{font-size:11px;color:#888}
#header-right{display:flex;align-items:center;gap:6px}
.hbtn{font-size:13px;padding:7px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;cursor:pointer;min-height:36px}
.hbtn:active{background:#eee}
#menu-wrap{position:relative}
#menu-dropdown{position:absolute;top:42px;right:0;background:#fff;border:1px solid #e0e0e0;border-radius:12px;z-index:50;min-width:190px;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.12)}
#menu-dropdown.open{display:block}
.menu-item{display:block;width:100%;padding:12px 16px;font-size:14px;color:#000;background:transparent;border:none;cursor:pointer;text-align:left;min-height:44px}
.menu-item:active{background:#f2f2f7}
#chat{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.welcome{text-align:center;padding:24px 0 12px}
.welcome-emoji{font-size:32px;margin-bottom:8px}
.welcome-title{font-size:15px;font-weight:600;color:#000;margin-bottom:4px}
.welcome-sub{font-size:13px;color:#888;line-height:1.5;margin-bottom:16px}
.examples{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.example-btn{padding:7px 12px;border-radius:20px;border:1px solid #ddd;background:#f8f8f8;color:#555;font-size:12px;cursor:pointer;font-family:inherit;min-height:36px}
.example-btn:active{background:#e8e8e8}
.msg-row{display:flex}
.msg-row.user{justify-content:flex-end}
.msg-row.bot{justify-content:flex-start}
.bubble-user{max-width:78%;padding:10px 14px;border-radius:18px 18px 4px 18px;background:#0057B7;color:#fff;font-size:15px;line-height:1.5;word-break:break-word}
.bubble-bot{max-width:88%;border:1px solid #e8e8e8;border-radius:4px 18px 18px 18px;overflow:hidden;background:#fff}
.bubble-top{padding:7px 12px;background:#f8f8f8;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;gap:6px;font-size:12px;color:#888}
.bubble-top-left{display:flex;align-items:center;gap:6px;flex:1}
.copy-btn{background:#e8f0fe;border:1px solid #c5d8fd;cursor:pointer;font-size:16px;padding:4px 10px;color:#0057B7;flex-shrink:0;min-width:72px;min-height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;gap:4px;font-family:inherit;font-weight:500}
.copy-btn:active{background:#c5d8fd}
.bubble-text{padding:10px 14px;font-size:15px;line-height:1.55;color:#000;word-break:break-word}
.bubble-note{padding:6px 14px 10px;font-size:12px;color:#888;font-style:italic;border-top:1px solid #e8e8e8}
.typing{display:flex;align-items:center;gap:4px;padding:12px 14px}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
#footer{border-top:1px solid #e0e0e0;padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom));display:flex;align-items:flex-end;gap:8px;flex-shrink:0;background:#f8f8f8}
#input{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:22px;font-size:16px;font-family:inherit;color:#000;background:#fff;resize:none;outline:none;line-height:1.4;max-height:120px;-webkit-appearance:none}
#input:focus{border-color:#0057B7}
#send-btn{width:40px;height:40px;border-radius:50%;border:none;background:#ccc;color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
#send-btn.active{background:#0057B7}
#toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);border-radius:20px;padding:8px 18px;font-size:13px;color:#fff;display:none;white-space:nowrap;z-index:100}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-left">
      <div id="logo">🌻</div>
      <div>
        <div id="header-title">Перекладач УКР ↔ ESP</div>
        <div id="header-sub">розуміє контекст · ігнорує помилки</div>
      </div>
    </div>
    <div id="header-right">
      <button class="hbtn" id="share-btn">↗ Поділитись</button>
      <div id="menu-wrap">
        <button class="hbtn" id="menu-btn">⋯</button>
        <div id="menu-dropdown">
          <button class="menu-item" id="clear-btn">🔄 Очистити чат</button>
          <button class="menu-item" id="copy-link-btn">📋 Копіювати посилання</button>
          <button class="menu-item" id="about-btn">ℹ️ Про бота</button>
        </div>
      </div>
    </div>
  </div>

  <div id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-emoji">🌻🌹</div>
      <div class="welcome-title">Контекстний перекладач</div>
      <div class="welcome-sub">Пиши українською або español —<br>автоматично визначу мову і перекладу.</div>
      <div class="examples" id="examples"></div>
    </div>
  </div>

  <div id="footer">
    <textarea id="input" placeholder="Напиши по-українськи або en español..." rows="1"></textarea>
    <button id="send-btn">↑</button>
  </div>
  <div id="toast"></div>
</div>

<script>
const WORKER_URL = 'https://ukr-esp-translator.vitaliy-androsyuk.workers.dev';

const EXAMPLES = [
  {text:"Що по чому?", hint:"сленг"},
  {text:"¿Qué onda, bro?", hint:"розмовне"},
  {text:"Не кажи гоп", hint:"приказка"},
  {text:"Más vale tarde que nunca", hint:"ідіома"},
  {text:"Я вже йду де-де", hint:"з помилками"},
];

const SYSTEM = `Ти — експертний перекладач між українською та іспанською мовами з глибоким знанням обох культур.

ПРАВИЛА:
1. Автоматично визначай мову вхідного тексту (українська або іспанська).
2. Якщо мова українська — перекладай на іспанську. Якщо іспанська — перекладай на українську.
3. ІГНОРУЙ орфографічні та граматичні помилки — розумій контекст.
4. Враховуй КОНТЕКСТ: сленг, ідіоми, жарти — перекладай по суті.
5. Використовуй ЛОКАЛЬНУ СПЕЦИФІКУ: для іспанської — нейтральний латиноамериканський варіант; для української — сучасна розмовна норма.
6. Якщо є ідіома без прямого перекладу — знайди еквівалент у цільовій мові.
7. Відповідай ЛИШЕ у форматі JSON (без жодного тексту навколо):
{"translation":"переклад","detected_lang":"uk або es","note":"необов'язкова коротка нотатка якщо є щось цікаве, інакше порожній рядок"}`;

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const welcome = document.getElementById('welcome');
const toast = document.getElementById('toast');
let loading = false;
let toastTimer;

const examplesDiv = document.getElementById('examples');
EXAMPLES.forEach(ex => {
  const btn = document.createElement('button');
  btn.className = 'example-btn';
  btn.textContent = ex.text + ' · ' + ex.hint;
  btn.onclick = () => send(ex.text);
  examplesDiv.appendChild(btn);
});

function showToast(msg) {
  toast.textContent = msg;
  toast.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.style.display = 'none', 2000);
}

function flagFrom(lang) { return lang === 'uk' ? '🇺🇦' : lang === 'es' ? '🇪🇸' : '🌐'; }
function flagTo(lang)   { return lang === 'uk' ? '🇪🇸' : lang === 'es' ? '🇺🇦' : '🌐'; }
function langLabel(lang){ return lang === 'uk' ? 'укр → іспанська' : lang === 'es' ? 'іспанська → укр' : ''; }

function addUserMsg(text) {
  welcome.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'msg-row user';
  const bbl = document.createElement('div');
  bbl.className = 'bubble-user';
  bbl.textContent = text;
  row.appendChild(bbl);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';
  const bbl = document.createElement('div');
  bbl.className = 'bubble-bot';
  bbl.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  row.appendChild(bbl);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function replaceTyping(typingRow, data) {
  const bbl = document.createElement('div');
  bbl.className = 'bubble-bot';

  const top = document.createElement('div');
  top.className = 'bubble-top';

  const left = document.createElement('div');
  left.className = 'bubble-top-left';
  left.innerHTML = `${flagFrom(data.detected_lang)} → ${flagTo(data.detected_lang)} <span style="opacity:.6">${langLabel(data.detected_lang)}</span>`;

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.title = 'Копіювати';
  copyBtn.textContent = '⎘ Копіювати';
  copyBtn.onclick = async () => {
    await navigator.clipboard.writeText(data.translation).catch(() => {});
    copyBtn.textContent = '✓ Скопійовано';
    setTimeout(() => copyBtn.textContent = '⎘ Копіювати', 2000);
    showToast('Скопійовано!');
  };

  top.appendChild(left);
  top.appendChild(copyBtn);

  const txt = document.createElement('div');
  txt.className = 'bubble-text';
  txt.textContent = data.translation;

  bbl.appendChild(top);
  bbl.appendChild(txt);

  if (data.note) {
    const note = document.createElement('div');
    note.className = 'bubble-note';
    note.textContent = '💡 ' + data.note;
    bbl.appendChild(note);
  }

  typingRow.innerHTML = '';
  typingRow.className = 'msg-row bot';
  typingRow.appendChild(bbl);
  chat.scrollTop = chat.scrollHeight;
}

async function send(text) {
  if (!text.trim() || loading) return;
  loading = true;
  sendBtn.className = '';
  input.value = '';
  input.style.height = 'auto';
  addUserMsg(text);
  const typingRow = addTyping();
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text, system: SYSTEM})
    });
    const d = await res.json();
    if (d.error) {
      replaceTyping(typingRow, {translation: `Помилка: ${d.error.message}`, detected_lang: '?', note: ''});
      return;
    }
    const raw = d.choices?.[0]?.message?.content || '{}';
    let parsed;
    try { parsed = JSON.parse(raw.replace(/```json|```/g, '').trim()); }
    catch { parsed = {translation: raw, detected_lang: '?', note: ''}; }
    if (!parsed.translation) parsed = {translation: raw || 'Порожня відповідь', detected_lang: '?', note: ''};
    replaceTyping(typingRow, parsed);
  } catch(e) {
    replaceTyping(typingRow, {translation: 'Помилка з\'єднання. Спробуй ще раз.', detected_lang: '?', note: ''});
  }
  loading = false;
  updateBtn();
}

function updateBtn() {
  sendBtn.className = input.value.trim() && !loading ? 'active' : '';
}

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  updateBtn();
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input.value); }
});
sendBtn.onclick = () => send(input.value);

const menuBtn = document.getElementById('menu-btn');
const menuDrop = document.getElementById('menu-dropdown');
menuBtn.onclick = (e) => { e.stopPropagation(); menuDrop.classList.toggle('open'); };
document.addEventListener('click', () => menuDrop.classList.remove('open'));

document.getElementById('clear-btn').onclick = () => {
  chat.innerHTML = '';
  chat.appendChild(welcome);
  welcome.style.display = '';
  menuDrop.classList.remove('open');
};

document.getElementById('copy-link-btn').onclick = async () => {
  await navigator.clipboard.writeText(window.location.href).catch(() => {});
  showToast('Посилання скопійовано!');
  menuDrop.classList.remove('open');
};

document.getElementById('share-btn').onclick = async () => {
  if (navigator.share) {
    await navigator.share({title: 'Перекладач УКР↔ESP', url: window.location.href}).catch(() => {});
  } else {
    await navigator.clipboard.writeText(window.location.href).catch(() => {});
    showToast('Посилання скопійовано!');
  }
};

document.getElementById('about-btn').onclick = () => {
  welcome.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  const bbl = document.createElement('div');
  bbl.className = 'bubble-bot';
  bbl.innerHTML = '<div class="bubble-top"><div class="bubble-top-left">🤖 інфо</div></div><div class="bubble-text">Я — контекстний перекладач між українською та іспанською. Розумію сленг, ідіоми та приказки. Ігнорую помилки і перекладаю по суті, а не дослівно. Безкоштовно та без реєстрації.</div>';
  row.appendChild(bbl);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  menuDrop.classList.remove('open');
};
</script>
</body>
</html>
